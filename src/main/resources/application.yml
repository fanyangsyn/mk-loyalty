spring:
  application:
    name: mk-loyalty
  datasource:
    url: jdbc:h2:file:./data/loyaltydb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console
  shell:
    interactive:
      enabled: true
